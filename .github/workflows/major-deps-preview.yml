# Preview available major npm upgrades without changing package.json.
# Run manually before merging a Dependabot "npm-major" PR.
#
# Actions → Major dependency preview → Run workflow

name: Major dependency preview

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/budgety?sslmode=disable
  BETTER_AUTH_SECRET: ci-build-placeholder-secret-min-32-chars
  BETTER_AUTH_URL: http://localhost:3000
  NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000

jobs:
  preview:
    name: Preview major updates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Baseline — lint and build (current versions)
        run: |
          npm run lint
          npm run build

      - name: List outdated packages
        run: npm outdated || true

      - name: Preview major version bumps (dry run)
        run: npx --yes npm-check-updates@latest --target major --format group --rejectVersion "^0."

      - name: Major upgrade checklist
        run: |
          cat <<'EOF'

          === Budgety major upgrade checklist ===

          1. Read the Dependabot PR body and changelogs for each package.
          2. Keep these aligned when bumping frameworks:
             - next + eslint-config-next (same major line)
             - react + react-dom
             - @mui/material + @mui/icons-material + @mui/x-date-pickers
             - better-auth + pg (auth; run scripts/init-auth-tables.sql after schema changes)
             - @neondatabase/serverless (API routes / Neon)
          3. Run locally:
               npm ci && npm run lint && npm run build
          4. Smoke-test: sign in, transactions list/calendar, import dialog, savings goals, bills.
          5. Merge only when CI (ESLint, Production build) is green.

          EOF
